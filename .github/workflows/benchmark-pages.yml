name: Benchmark Pages

on:
  push:
    branches:
      - main
      - feature/bench-mark
    paths:
      - pages/**
      - .github/workflows/benchmark-pages.yml

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: benchmark-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify Pages bundle
        run: |
          test -f pages/index.html
          test -f pages/benchmarks.json

      - name: Publish benchmark site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          keep_files: true
