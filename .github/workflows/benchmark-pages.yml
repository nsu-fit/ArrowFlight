name: Benchmark Pages

on:
  push:
    branches:
      - main
      - feature/bench-mark
    paths:
      - pages/**
      - .github/workflows/benchmark-pages.yml

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: benchmark-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'github-pages' || 'benchmark-pages' }}
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify Pages bundle
        run: |
          test -f pages/index.html
          test -f pages/benchmarks.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload benchmark site
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
