# Arrow batch size shared by Acero scans and DuckDB Arrow export.
batchSize=4096

# Server defaults.
numServers=4
dataDir=/data/parquet
# Optional local mirror of dataDir. HDFS files are read from here by Acero when
# the packaged Arrow Dataset JNI has no native HDFS support.
localDataDir=
port=32010
hazelcastPort=5701
grpcMaxInboundMessageSize=2147483647
flightListenerReadyTimeoutMs=300000

# Hadoop client I/O.
ioFileBufferSize=131072

# Client retry and timeout settings.
client.maxRetries=3
client.retryBackoffMs=1000
# Disabled by default because Flight call deadlines include full stream processing time.
client.connectTimeoutMs=0

# Parallel Parquet footer reads / Acero scans / DuckDB worker tasks.
# If ioParallelism is set, it wins. Otherwise:
# max(ioParallelismMinThreads, min(availableProcessors, ioParallelismMaxCores) * ioParallelismMultiplier)
ioParallelism=
ioParallelismMinThreads=32
ioParallelismMaxCores=0
ioParallelismMultiplier=8

# DuckDB execution.
duckDbWarmConnections=8
duckDbGroups=8
duckDbThreads=2

# DuckDB HDFS extension. Environment variables with the same meaning still work:
# DUCKDB_HDFS_EXTENSION, DUCKDB_ALLOW_UNSIGNED_EXTENSIONS, HDFS_DEFAULT_NAMENODE,
# HDFS_HA_NAMENODES, HDFS_SHORTCIRCUIT, HDFS_DOMAIN_SOCKET_PATH.
duckDbHdfsExtension=
duckDbAllowUnsignedExtensions=
duckDbHdfsDefaultNamenode=
duckDbHdfsHaNamenodes=
duckDbHdfsShortcircuit=
duckDbHdfsDomainSocketPath=

# Logging level for SLF4J Simple. Valid: TRACE, DEBUG, INFO, WARN, ERROR, OFF.
# DEBUG shows file resolution, per-batch progress, executor pool state.
# INFO shows query start/end, engine choice, endpoint assignment, totals.
# WARN shows timeouts, retries, backpressure >100ms, stale cache entries.
logLevel=DEBUG
