image: maven:3-eclipse-temurin-21

variables:
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  key: "$CI_JOB_NAME"
  paths:
    - .m2/repository/

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

stages:
  - compile
  - lint
  - test
  - coverage
  - pages

build-server:
  stage: compile
  script:
    - mvn compile -P server $MAVEN_CLI_OPTS
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build-client:
  stage: compile
  script:
    - mvn compile -P client $MAVEN_CLI_OPTS
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:
  stage: lint
  script:
    - mvn compile checkstyle:check $MAVEN_CLI_OPTS
    - mvn spotbugs:check $MAVEN_CLI_OPTS
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

integration:
  stage: test
  script:
    - mvn test -P integration $MAVEN_CLI_OPTS
  artifacts:
    reports:
      junit: target/surefire-reports/TEST-*.xml

coverage:
  stage: coverage
  script:
    - mvn clean verify -B -Dmaven.test.failure.ignore=true
    - |
      python3 <<'PYEOF'
      import xml.etree.ElementTree as ET
      r = ET.parse('target/site/jacoco/jacoco.xml').getroot()
      c = r.find('.//counter[@type="INSTRUCTION"]')
      covered = int(c.get('covered'))
      missed = int(c.get('missed'))
      pct = covered / (covered + missed) * 100
      print(f'JaCoCo coverage: {pct:.1f}%')
      PYEOF
  allow_failure: true
  artifacts:
    paths:
      - target/site/jacoco/
    reports:
      junit: target/surefire-reports/TEST-*.xml
  coverage: '/JaCoCo coverage:\s*(\d+\.\d+)%/'

pages:
  stage: pages
  dependencies:
    - coverage
  script:
    - mkdir -p public/jacoco
    - cp -r target/site/jacoco/* public/jacoco/
  artifacts:
    paths:
      - public/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment: production
