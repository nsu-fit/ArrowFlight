services:
  postgres:
    image: "${BENCH_POSTGRES_IMAGE:-postgres:16}"
    environment:
      POSTGRES_DB: benchbase
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "${BENCH_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d benchbase"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - bench-postgres-data:/var/lib/postgresql/data

  benchbase:
    image: "${BENCHBASE_IMAGE:-benchbase.azurecr.io/benchbase:latest}"
    profiles: ["bench"]
    environment:
      BENCHBASE_PROFILE: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config/postgres:/benchbase/config/custom/postgres:ro
      - ./results:/benchbase/results

volumes:
  bench-postgres-data:
