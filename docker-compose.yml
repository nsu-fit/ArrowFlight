x-arrowflight-image: &arrowflight-image
  image: arrowflight-test:latest
  build:
    context: .
    dockerfile: docker/Dockerfile

x-server-node-env: &server-node-env
  FLIGHT_DATA_DIR: "${HDFS_DATA_DIR:-hdfs://hdfs-namenode:8020/bench}"
  FLIGHT_LOCAL_DATA_DIR: "/staging"
  FLIGHT_PORT: "32010"
  FLIGHT_HOSTS: "${FLIGHT_HOSTS:-flight-server-1,flight-server-2,flight-server-3}"
  HAZELCAST_PORT: "5701"
  HDFS_NAMENODE_HOST: hdfs-namenode
  HDFS_NAMENODE_PORT: "8020"
  HDFS_READY_PATH: "${HDFS_BENCHMARK_PATH:-/bench}/_READY"
  HDFS_BLOCK_SIZE_BYTES: "${HDFS_BLOCK_SIZE_BYTES:-1073741824}"
  SPARK_MASTER_URL: spark://spark-master:7077
  SPARK_WORKER_CORES: "2"
  SPARK_WORKER_MEMORY: 2g
  JAVA_OPTS: -Xmx2g

x-server-node: &server-node
  <<: *arrowflight-image
  command: ["benchmark-node"]
  depends_on:
    hdfs-namenode:
      condition: service_healthy
    spark-master:
      condition: service_started
  healthcheck:
    test: ["CMD-SHELL", "bash -c '</dev/tcp/$${HOSTNAME}/32010'"]
    interval: 5s
    timeout: 3s
    retries: 60
    start_period: 30s

services:
  hdfs-namenode:
    <<: *arrowflight-image
    command: ["hdfs-namenode"]
    hostname: hdfs-namenode
    environment:
      HDFS_DATANODE_HOSTNAME: hdfs-namenode
      HDFS_BLOCK_SIZE_BYTES: "${HDFS_BLOCK_SIZE_BYTES:-1073741824}"
    volumes:
      - hdfs-namenode-data:/var/lib/hadoop-hdfs/name
    ports:
      - "8020:8020"
      - "9870:9870"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/hdfs-namenode/8020'"]
      interval: 5s
      timeout: 3s
      retries: 60

  spark-master:
    <<: *arrowflight-image
    command: ["spark-master"]
    hostname: spark-master
    ports:
      - "7077:7077"
      - "8080:8080"

  server-node-1:
    <<: *server-node
    hostname: server-node-1
    environment:
      <<: *server-node-env
      HDFS_DATANODE_HOSTNAME: server-node-1
      FLIGHT_LOCALHOST: flight-server-1
      FLIGHT_LOCAL_STORAGE_HOST: server-node-1
      SPARK_LOCAL_HOSTNAME: server-node-1
      SPARK_WORKER_WEBUI_PORT: "8081"
    volumes:
      - server-node-1-staging:/staging:ro
      - hdfs-datanode-1-data:/var/lib/hadoop-hdfs/data
      - spark-warehouse:/spark-warehouse
    ports:
      - "32010:32010"
      - "8081:8081"
      - "9864:9864"
    networks:
      default:
        aliases:
          - flight-server-1
          - datanode-1
          - spark-worker-1

  server-node-2:
    <<: *server-node
    hostname: server-node-2
    environment:
      <<: *server-node-env
      HDFS_DATANODE_HOSTNAME: server-node-2
      FLIGHT_LOCALHOST: flight-server-2
      FLIGHT_LOCAL_STORAGE_HOST: server-node-2
      SPARK_LOCAL_HOSTNAME: server-node-2
      SPARK_WORKER_WEBUI_PORT: "8082"
    volumes:
      - server-node-2-staging:/staging:ro
      - hdfs-datanode-2-data:/var/lib/hadoop-hdfs/data
      - spark-warehouse:/spark-warehouse
    ports:
      - "32011:32010"
      - "8082:8082"
      - "9865:9864"
    networks:
      default:
        aliases:
          - flight-server-2
          - datanode-2
          - spark-worker-2

  server-node-3:
    <<: *server-node
    hostname: server-node-3
    environment:
      <<: *server-node-env
      HDFS_DATANODE_HOSTNAME: server-node-3
      FLIGHT_LOCALHOST: flight-server-3
      FLIGHT_LOCAL_STORAGE_HOST: server-node-3
      SPARK_LOCAL_HOSTNAME: server-node-3
      SPARK_WORKER_WEBUI_PORT: "8083"
    volumes:
      - server-node-3-staging:/staging:ro
      - hdfs-datanode-3-data:/var/lib/hadoop-hdfs/data
      - spark-warehouse:/spark-warehouse
    ports:
      - "32012:32010"
      - "8083:8083"
      - "9866:9864"
    networks:
      default:
        aliases:
          - flight-server-3
          - datanode-3
          - spark-worker-3

  spark-benchmark-publisher:
    <<: *arrowflight-image
    profiles: ["benchbase"]
    command: ["publish-benchmark-data"]
    environment:
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_DRIVER_HOST: spark-benchmark-publisher
      BENCHMARK_DATASET: "${BENCHMARK_DATASET:-tpch}"
      BENCHMARK_SCHEMA: "${BENCHMARK_SCHEMA:-tpch}"
      BENCHMARK_SOURCE_SCHEMA: "${BENCHMARK_SOURCE_SCHEMA:-tpch}"
      BENCHMARK_PUBLISH_MODE: "${BENCHMARK_PUBLISH_MODE:-flight}"
      SPARK_PUBLISH_SCHEMA: "${SPARK_PUBLISH_SCHEMA:-}"
      FLIGHT_PUBLISH_SCHEMA: "${FLIGHT_PUBLISH_SCHEMA:-tpch_flight}"
      DIRECT_PUBLISH_SCHEMA: "${DIRECT_PUBLISH_SCHEMA:-tpch_direct}"
      FLIGHT_SOURCE_HOST: "${FLIGHT_SOURCE_HOST:-flight-server-1}"
      FLIGHT_SOURCE_PORT: "${FLIGHT_SOURCE_PORT:-32010}"
      HDFS_DATA_DIR: "${HDFS_DATA_DIR:-hdfs://hdfs-namenode:8020/bench}"
      DIRECT_PARQUET_DIR: "${DIRECT_PARQUET_DIR:-hdfs://hdfs-namenode:8020/bench}"
      SPARK_WAREHOUSE_DIR: /spark-warehouse
      SPARK_METASTORE_DB: /spark-warehouse/metastore_db
    volumes:
      - spark-warehouse:/spark-warehouse
    restart: "no"

  duckdb-benchmark-generator:
    build:
      context: ./benchmarks/benchbase-spark
      dockerfile: duckdb-generator.Dockerfile
    profiles: ["benchbase"]
    environment:
      BENCHMARK_DATASET: "${BENCHMARK_DATASET:-tpch}"
      BENCHMARK_SCHEMA: "${BENCHMARK_SCHEMA:-tpch}"
      BENCHMARK_SCALE_FACTOR: "${BENCHMARK_SCALE_FACTOR:-0.01}"
      BENCHMARK_QUERY_SET: "${BENCHMARK_QUERY_SET:-}"
      BENCHMARK_METADATA_OUT: "${BENCHMARK_METADATA_OUT:-}"
      FLIGHT_HOSTS: "${FLIGHT_HOSTS:-flight-server-1,flight-server-2,flight-server-3}"
      FLIGHT_SERVERS: "${FLIGHT_SERVERS:-flight-server-1:32010,flight-server-2:32010,flight-server-3:32010}"
      FLIGHT_SERVER_DATA_DIRS: "${FLIGHT_SERVER_DATA_DIRS:-/server-data/server-node-1,/server-data/server-node-2,/server-data/server-node-3}"
      HDFS_DATA_DIR: "${HDFS_DATA_DIR:-hdfs://hdfs-namenode:8020/bench}"
      HDFS_BLOCK_SIZE_BYTES: "${HDFS_BLOCK_SIZE_BYTES:-1073741824}"
    volumes:
      - server-node-1-staging:/server-data/server-node-1
      - server-node-2-staging:/server-data/server-node-2
      - server-node-3-staging:/server-data/server-node-3
      - ./benchmarks/benchbase-spark/results:/benchbase/results
    restart: "no"

  spark-thrift-server:
    <<: *arrowflight-image
    profiles: ["benchbase"]
    command: ["spark-thrift-server"]
    environment:
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_DRIVER_HOST: spark-thrift-server
      SPARK_THRIFT_BIND_HOST: 0.0.0.0
      SPARK_THRIFT_PORT: "10000"
      SPARK_WAREHOUSE_DIR: /spark-warehouse
      SPARK_METASTORE_DB: /spark-warehouse/metastore_db
    ports:
      - "10000:10000"
      - "4040:4040"
    volumes:
      - spark-warehouse:/spark-warehouse
      - ./benchmarks/benchbase-spark/results:/benchbase/results
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/10000'"]
      interval: 5s
      timeout: 3s
      retries: 60

  benchbase-spark:
    build:
      context: ./benchmarks/benchbase-spark
      args:
        BENCHBASE_IMAGE: "${BENCHBASE_IMAGE:-benchbase.azurecr.io/benchbase:latest}"
    profiles: ["benchbase"]
    environment:
      BENCHBASE_PROFILE: postgres
      BENCHBASE_QUERY_TIMEOUT_SECONDS: "${BENCHBASE_QUERY_TIMEOUT_SECONDS:-120}"
    depends_on:
      spark-thrift-server:
        condition: service_healthy
    volumes:
      - ./benchmarks/benchbase-spark/config:/benchbase/config/custom:ro
      - ./benchmarks/benchbase-spark/results:/benchbase/results

volumes:
  hdfs-namenode-data:
  hdfs-datanode-1-data:
  hdfs-datanode-2-data:
  hdfs-datanode-3-data:
  server-node-1-staging:
  server-node-2-staging:
  server-node-3-staging:
  spark-warehouse:
