x-arrowflight-image: &arrowflight-image
  image: arrowflight-test:latest
  build:
    context: .
    dockerfile: docker/Dockerfile

x-server-env: &server-env
  FLIGHT_DATA_DIR: /data/parquet
  FLIGHT_PORT: "32010"
  FLIGHT_HOSTS: "${FLIGHT_HOSTS:-flight-server-1,flight-server-2,flight-server-3}"
  HAZELCAST_PORT: "5701"
  JAVA_OPTS: -Xmx2g

services:
  spark-master:
    <<: *arrowflight-image
    command: ["spark-master"]
    ports:
      - "7077:7077"
      - "8080:8080"

  spark-worker-1:
    <<: *arrowflight-image
    command: ["spark-worker"]
    environment:
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_WEBUI_PORT: "8081"
    depends_on:
      - spark-master
    volumes:
      - spark-warehouse:/spark-warehouse
      - direct-parquet-data:/direct-data
    ports:
      - "8081:8081"

  spark-worker-2:
    <<: *arrowflight-image
    command: ["spark-worker"]
    environment:
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_WEBUI_PORT: "8082"
    depends_on:
      - spark-master
    volumes:
      - spark-warehouse:/spark-warehouse
      - direct-parquet-data:/direct-data
    ports:
      - "8082:8082"

  spark-benchmark-publisher:
    <<: *arrowflight-image
    profiles: ["benchbase"]
    command: ["publish-benchmark-data"]
    environment:
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_DRIVER_HOST: spark-benchmark-publisher
      BENCHMARK_DATASET: "${BENCHMARK_DATASET:-tpch}"
      BENCHMARK_SCHEMA: "${BENCHMARK_SCHEMA:-tpch}"
      BENCHMARK_SOURCE_SCHEMA: "${BENCHMARK_SOURCE_SCHEMA:-tpch}"
      BENCHMARK_PUBLISH_MODE: "${BENCHMARK_PUBLISH_MODE:-flight}"
      SPARK_PUBLISH_SCHEMA: "${SPARK_PUBLISH_SCHEMA:-}"
      FLIGHT_PUBLISH_SCHEMA: "${FLIGHT_PUBLISH_SCHEMA:-tpch_flight}"
      DIRECT_PUBLISH_SCHEMA: "${DIRECT_PUBLISH_SCHEMA:-tpch_direct}"
      FLIGHT_SOURCE_HOST: "${FLIGHT_SOURCE_HOST:-flight-server-1}"
      FLIGHT_SOURCE_PORT: "${FLIGHT_SOURCE_PORT:-32010}"
      FLIGHT_SERVER_DATA_DIRS: "${FLIGHT_SERVER_DATA_DIRS:-/server-data/all}"
      DIRECT_PARQUET_DIR: "${DIRECT_PARQUET_DIR:-/direct-data}"
      SPARK_WAREHOUSE_DIR: /spark-warehouse
      SPARK_METASTORE_DB: /spark-warehouse/metastore_db
    volumes:
      - flight-server-all-data:/server-data/all
      - flight-server-1-data:/server-data/flight-server-1
      - flight-server-2-data:/server-data/flight-server-2
      - flight-server-3-data:/server-data/flight-server-3
      - direct-parquet-data:/direct-data
      - spark-warehouse:/spark-warehouse
    restart: "no"

  duckdb-benchmark-generator:
    build:
      context: ./benchmarks/benchbase-spark
      dockerfile: duckdb-generator.Dockerfile
    profiles: ["benchbase"]
    environment:
      BENCHMARK_DATASET: "${BENCHMARK_DATASET:-tpch}"
      BENCHMARK_SCHEMA: "${BENCHMARK_SCHEMA:-tpch}"
      BENCHMARK_SCALE_FACTOR: "${BENCHMARK_SCALE_FACTOR:-0.01}"
      BENCHMARK_QUERY_SET: "${BENCHMARK_QUERY_SET:-}"
      BENCHMARK_METADATA_OUT: "${BENCHMARK_METADATA_OUT:-}"
      FLIGHT_SERVER_DATA_DIRS: "${FLIGHT_SERVER_DATA_DIRS:-/server-data/all}"
      GENERATE_DIRECT_PARQUET: "${GENERATE_DIRECT_PARQUET:-false}"
      DIRECT_PARQUET_DIR: "${DIRECT_PARQUET_DIR:-/direct-data}"
      DIRECT_PARQUET_PARTITIONS: "${DIRECT_PARQUET_PARTITIONS:-}"
    volumes:
      - flight-server-all-data:/server-data/all
      - flight-server-1-data:/server-data/flight-server-1
      - flight-server-2-data:/server-data/flight-server-2
      - flight-server-3-data:/server-data/flight-server-3
      - direct-parquet-data:/direct-data
      - ./benchmarks/benchbase-spark/results:/benchbase/results
    restart: "no"

  spark-thrift-server:
    <<: *arrowflight-image
    profiles: ["benchbase"]
    command: ["spark-thrift-server"]
    environment:
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_DRIVER_HOST: spark-thrift-server
      SPARK_THRIFT_BIND_HOST: 0.0.0.0
      SPARK_THRIFT_PORT: "10000"
      SPARK_WAREHOUSE_DIR: /spark-warehouse
      SPARK_METASTORE_DB: /spark-warehouse/metastore_db
    ports:
      - "10000:10000"
      - "4040:4040"
    volumes:
      - spark-warehouse:/spark-warehouse
      - direct-parquet-data:/direct-data
      - ./benchmarks/benchbase-spark/results:/benchbase/results
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/10000'"]
      interval: 5s
      timeout: 3s
      retries: 60

  benchbase-spark:
    build:
      context: ./benchmarks/benchbase-spark
      args:
        BENCHBASE_IMAGE: "${BENCHBASE_IMAGE:-benchbase.azurecr.io/benchbase:latest}"
    profiles: ["benchbase"]
    environment:
      BENCHBASE_PROFILE: postgres
    depends_on:
      spark-thrift-server:
        condition: service_healthy
    volumes:
      - ./benchmarks/benchbase-spark/config:/benchbase/config/custom:ro
      - ./benchmarks/benchbase-spark/results:/benchbase/results

  flight-server-1:
    <<: *arrowflight-image
    command: ["server"]
    environment:
      <<: *server-env
      FLIGHT_LOCALHOST: flight-server-1
    volumes:
      - flight-server-all-data:/data/parquet
    ports:
      - "32010:32010"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/$${FLIGHT_LOCALHOST}/$${FLIGHT_PORT}'"]
      interval: 5s
      timeout: 3s
      retries: 60

  flight-server-2:
    <<: *arrowflight-image
    command: ["server"]
    environment:
      <<: *server-env
      FLIGHT_LOCALHOST: flight-server-2
    volumes:
      - flight-server-all-data:/data/parquet
    ports:
      - "32011:32010"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/$${FLIGHT_LOCALHOST}/$${FLIGHT_PORT}'"]
      interval: 5s
      timeout: 3s
      retries: 60

  flight-server-3:
    <<: *arrowflight-image
    command: ["server"]
    environment:
      <<: *server-env
      FLIGHT_LOCALHOST: flight-server-3
    volumes:
      - flight-server-all-data:/data/parquet
    ports:
      - "32012:32010"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/$${FLIGHT_LOCALHOST}/$${FLIGHT_PORT}'"]
      interval: 5s
      timeout: 3s
      retries: 60

volumes:
  flight-server-all-data:
  flight-server-1-data:
  flight-server-2-data:
  flight-server-3-data:
  direct-parquet-data:
  spark-warehouse:
